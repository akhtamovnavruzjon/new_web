{% extends 'base.html' %}

{% block content %}

<style>

.article-box{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.article-title{
    text-align:center;
    margin-bottom:30px;
    color:#0d6efd;
    font-size:32px;
    font-weight:bold;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-control{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    height:50px;
}

textarea.form-control{
    min-height:250px;
}

.save-btn{
    width:100%;
    padding:14px;
    background:#198754;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.save-btn:hover{
    background:#157347;
}

</style>

<div class="article-box">

    <h2 class="article-title">📰 Yangi Yangilik Qo'shish</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="form-group">
            <label>Sarlavha</label>
            <input type="text" name="title" class="form-control">
        </div>

        <div class="form-group">
            <label>Rasm</label>
            <input type="file" name="cover" class="form-control">
        </div>

        <div class="form-group">
            <label>Kategoriya</label>

            <select name="category" class="form-control">

                {% for c in categories %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}

            </select>
        </div>

        <div class="form-group">
            <label>Yangilik matni</label>

            <textarea name="body" class="form-control"></textarea>
        </div>

        <button class="save-btn">
            ✔ Yangilikni Nashr Etish
        </button>

    </form>

</div>

{% endblock %}
