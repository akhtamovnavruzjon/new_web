{% extends 'base.html' %}


{% block content %}

        <!-- Category News Start-->
        <div class="cat-news">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-6">
                        <h2><i class="fas fa-align-justify"></i>Sport</h2>
                        <div class="row cn-slider">
                            {% for r in sports_new %}
                            <div class="col-md-6">
                                <div class="cn-img">
                                    <img src="{{ r.cover.url }}" />
                                    <div class="cn-content">
                                        <div class="cn-content-inner">
                                            <a class="cn-date" href="{% url 'detail_n' r.slug %}"><i class="far fa-clock"></i>{{ r.created_at }}</a>
                                            <a class="cn-title" href="{% url 'detail_n' r.slug %}">{{ r.title }}</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}


                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Category News End-->


{% endblock content %}
