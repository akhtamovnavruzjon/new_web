<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f5f7fa;
        }

        .register-card{
            max-width: 700px;
            margin: 50px auto;
            border: none;
            border-radius: 15px;
        }

        .card-header{
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 25px;
            border-radius: 15px 15px 0 0 !important;
        }

        textarea{
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card shadow register-card">

        <div class="card-header">
            <h2>📝 Ro'yxatdan o'tish</h2>
            <p class="mb-0">
                Izoh qoldirish uchun avval ro'yxatdan o'ting
            </p>
        </div>

        <div class="card-body p-4">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ism</label>
                        <input
                            type="text"
                            class="form-control"
                            name="first_name"
                            placeholder="Ismingiz">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Familiya</label>
                        <input
                            type="text"
                            class="form-control"
                            name="last_name"
                            placeholder="Familiyangiz">
                    </div>

                    <div class="row">
    <div class="col-md-6 mb-3">
        <label class="form-label">Parol</label>
        <input
            type="password"
            class="form-control"
            name="password"
            placeholder="Parolingiz">
    </div>


</div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Foydalanuvchi nomi</label>
                        <input
                            type="text"
                            class="form-control"
                            name="username"
                            placeholder="Foydalanuvchi nomingiz">
                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Yosh</label>
                    <input
                        type="number"
                        class="form-control"
                        name="age"
                        placeholder="Yoshingiz">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email manzil</label>
                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        placeholder="example@gmail.com">
                </div>

                <div class="mb-4">
                    <label class="form-label">Bio</label>
                    <textarea
                        class="form-control"
                        rows="5"
                        name="bio"
                        placeholder="O'zingiz haqingizda qisqacha yozing"></textarea>
                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100 py-2">

                    Ro'yxatdan o'tish

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
