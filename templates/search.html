<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Qidiruv natijasi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f8f9fa;
        }

        .article-card{
            transition:0.3s;
        }

        .article-card:hover{
            transform:translateY(-5px);
        }

        .article-image{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">🔍 Qidiruv natijalari</h1>

    {% for f in articles %}

    <div class="card shadow-sm mb-4 article-card">
        <div class="row g-0">

            <!-- Rasm -->
            <div class="col-md-4">
                <img src="{{ f.cover.url }}"
                     class="article-image p-2"
                     alt="{{ f.title }}">
            </div>

            <!-- Matn -->
            <div class="col-md-8">
                <div class="card-body">

                    <h3 class="card-title">
                        {{ f.title }}
                    </h3>

                    <p class="card-text text-secondary">
                        {{ f.body }}
                    </p>

                </div>
            </div>

        </div>
    </div>

    {% empty %}

    <div class="alert alert-warning text-center">
        Hech qanday natija topilmadi 😔
    </div>

    {% endfor %}

</div>

</body>
</html>
